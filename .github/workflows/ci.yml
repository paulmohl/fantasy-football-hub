name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend — lint / type-check / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ffhub_test
          POSTGRES_USER: ffhub
          POSTGRES_PASSWORD: ffhub
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check app workers

      - name: Type-check (mypy)
        run: mypy app --ignore-missing-imports

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://ffhub:ffhub@localhost:5432/ffhub_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-secret-32-chars-minimum-here
          APP_SECRET_KEY: ci-secret-32-chars-minimum-here
          JWT_EXPIRE_MINUTES: "15"
          IS_PRODUCTION: "false"
          SLEEPER_API_BASE: https://api.sleeper.app/v1
        run: pytest --tb=short -q

  frontend:
    name: Frontend — type-check / lint / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
