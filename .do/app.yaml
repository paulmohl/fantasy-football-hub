name: fantasy-football-hub
region: nyc
domains:
  - domain: predictfantasyfootball.com
    type: PRIMARY
  - domain: www.predictfantasyfootball.com
    type: ALIAS

services:
  - name: backend
    github:
      repo: paulmohl/fantasy-football-hub
      branch: master
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /api
      - path: /ws
    health_check:
      http_path: /api/v1/health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_EXPIRE_MINUTES
        scope: RUN_TIME
        value: "60"
      - key: IS_PRODUCTION
        scope: RUN_TIME
        value: "true"
      - key: SLEEPER_API_BASE
        scope: RUN_TIME
        value: https://api.sleeper.app/v1

  - name: worker
    github:
      repo: paulmohl/fantasy-football-hub
      branch: master
      deploy_on_push: false
    source_dir: backend
    dockerfile_path: Dockerfile
    run_command: arq workers.tasks.WorkerSettings
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        value: ${backend.JWT_SECRET}
      - key: APP_SECRET_KEY
        scope: RUN_TIME
        value: ${backend.APP_SECRET_KEY}
      - key: IS_PRODUCTION
        scope: RUN_TIME
        value: "true"
      - key: SLEEPER_API_BASE
        scope: RUN_TIME
        value: https://api.sleeper.app/v1

jobs:
  - name: migrate
    github:
      repo: paulmohl/fantasy-football-hub
      branch: master
    source_dir: backend
    dockerfile_path: Dockerfile
    run_command: alembic upgrade head
    kind: POST_DEPLOY
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

static_sites:
  - name: frontend
    github:
      repo: paulmohl/fantasy-football-hub
      branch: master
      deploy_on_push: false
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-dev-database
    num_nodes: 1
